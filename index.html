<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramadan Sarah: Full Experience</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Poppins:wght@400;600&display=swap');
        :root { --gold: #f5c842; --bolt: #00f2ff; --green: #4caf50; --red: #ff4d4d; --pink: #fd79a8; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: #000; font-family: 'Poppins', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        #game-container { width: 1150px; height: 650px; background: #111; border: 3px solid var(--gold); position: relative; display: flex; flex-direction: column; }
        
        #stat-bar { background: #000; display: flex; padding: 15px; border-bottom: 2px solid var(--gold); gap: 15px; }
        .stat-item { flex: 1; font-family: 'Oswald'; font-size: 0.8rem; color: #fff; text-transform: uppercase; }
        .bar-bg { width: 100%; height: 10px; background: #333; margin-top: 5px; border-radius: 5px; overflow: hidden; }
        .bar-fill { height: 100%; transition: 0.5s; width: 0%; }

        #view-area { flex-grow: 1; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #scene-bg { position: absolute; inset: 0; background-size: cover; background-position: center; filter: brightness(0.3); z-index: 1; transition: 1s; }
        
        #game-ui { position: relative; z-index: 10; width: 550px; text-align: center; }
        #status-text { font-family: 'Oswald'; font-size: 1.8rem; color: var(--gold); margin-bottom: 20px; text-shadow: 3px 3px #000; letter-spacing: 1px; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .game-btn { background: rgba(0,0,0,0.9); color: #fff; border: 2px solid var(--gold); padding: 15px; font-family: 'Oswald'; cursor: pointer; text-transform: uppercase; font-size: 0.9rem; transition: 0.2s; }
        .game-btn:hover:not(.disabled) { background: var(--gold); color: #000; transform: scale(1.02); }
        .game-btn.disabled { opacity: 0.1; cursor: not-allowed; pointer-events: none; filter: grayscale(1); }
        .full-btn { grid-column: span 2; }
        .fav-btn { border-color: var(--bolt); color: var(--bolt); font-weight: bold; box-shadow: 0 0 10px rgba(0, 242, 255, 0.3); }

        #dialogue-box { background: #fff; color: #000; padding: 30px; border: 4px solid var(--gold); border-radius: 2px; display: none; text-align: left; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #diag-msg { font-weight: 600; font-size: 1.2rem; margin-bottom: 25px; color: #111; line-height: 1.5; }

        #game-over { position: absolute; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #game-over h1 { font-family: 'Oswald'; font-size: 6rem; color: var(--red); }
    </style>
</head>
<body>

<div id="game-over">
    <h1 id="death-title">SARAH DIES</h1>
    <p id="death-msg" style="color: #fff; margin-top: 15px; font-family: 'Oswald'; font-size: 2rem;"></p>
    <button class="game-btn" style="width: 300px; margin-top: 40px;" onclick="location.reload()">RESTART JOURNEY</button>
</div>

<div id="game-container">
    <div id="stat-bar">
        <div class="stat-item">ENERGY <div class="bar-bg"><div id="e-bar" class="bar-fill" style="background:var(--bolt)"></div></div></div>
        <div class="stat-item">IMAN <div class="bar-bg"><div id="i-bar" class="bar-fill" style="background:var(--gold)"></div></div></div>
        <div class="stat-item">SOCIAL <div class="bar-bg"><div id="s-bar" class="bar-fill" style="background:var(--pink)"></div></div></div>
        <div class="stat-item">GRADES <div class="bar-bg"><div id="g-bar" class="bar-fill" style="background:#fff"></div></div></div>
        <div class="stat-item">SAVINGS ($<span id="m-val">100</span>) <div class="bar-bg"><div id="m-bar" class="bar-fill" style="background:var(--green)"></div></div></div>
    </div>

    <div id="view-area">
        <div id="scene-bg"></div>
        <div id="game-ui">
            <div id="status-text"></div>
            <div id="map-ui" class="btn-grid">
                <button class="game-btn" id="btn-HOME" onclick="goTo('HOME')">HOME</button>
                <button class="game-btn" id="btn-SCHOOL" onclick="goTo('SCHOOL')">ACADEMY</button>
                <button class="game-btn" id="btn-MOSQUE" onclick="goTo('MOSQUE')">MOSQUE</button>
                <button class="game-btn" id="btn-MARKET" onclick="goTo('MARKET')">SUPERMARKET</button>
                <button class="game-btn full-btn" id="btn-MALL" onclick="goTo('MALL')">THE MALL</button>
            </div>
            <div id="dialogue-box">
                <p id="diag-msg"></p>
                <div class="btn-grid" id="choices"></div>
            </div>
        </div>
    </div>
</div>

<script>
const imgs = {
    HOME: "https://i.pinimg.com/1200x/ab/28/4c/ab284c12a0c9e4bd5b514458f519ec75.jpg",
    SCHOOL: "https://i.pinimg.com/1200x/0b/91/f2/0b91f2f4370cf26f23e44efe7136195c.jpg",
    MOSQUE: "https://i.pinimg.com/736x/10/23/db/1023dbabf8efd1d838455991909ec75c.jpg",
    MARKET: "https://images.unsplash.com/photo-1542838132-92c53300491e?q=80&w=1000",
    MALL: "https://images.unsplash.com/photo-1567401893414-76b7b1e5a7a5?q=80&w=1000",
    FEST: "https://images.unsplash.com/photo-1519222970733-f546218fa6d7?q=80&w=1000",
    EID: "https://images.unsplash.com/photo-1533174072545-7a4b6ad7a6c3?q=80&w=1000"
};

let s = { day: 1, dIdx: 0, tIdx: 0, e: 85, i: 50, soc: 50, g: 60, m: 100, designer: false };
const week = ["MON", "TUE", "WED", "THU", "FRI", "SAT", "SUN"];
const times = ["MORNING", "AFTERNOON", "EVENING"];

function updateUI() {
    if (s.e <= 0) { triggerGameOver("SARAH COLLAPSED FROM EXHAUSTION."); return; }
    s.e = Math.min(100, s.e); s.i = Math.min(100, s.i); s.soc = Math.min(100, s.soc); s.g = Math.min(100, s.g);
    
    document.getElementById('status-text').innerText = `DAY ${s.day} (${week[s.dIdx]}) - ${times[s.tIdx]}`;
    document.getElementById('e-bar').style.width = s.e + "%";
    document.getElementById('i-bar').style.width = s.i + "%";
    document.getElementById('s-bar').style.width = s.soc + "%";
    document.getElementById('g-bar').style.width = s.g + "%";
    document.getElementById('m-bar').style.width = Math.min(100, (s.m / 500) * 100) + "%";
    document.getElementById('m-val').innerText = Math.floor(s.m);
    
    const isMorning = s.tIdx === 0; const isWeekday = s.dIdx < 5;
    ["HOME", "SCHOOL", "MOSQUE", "MARKET", "MALL"].forEach(l => {
        const b = document.getElementById(`btn-${l}`); b.classList.remove('disabled');
        if (isMorning && isWeekday && l !== "SCHOOL") b.classList.add('disabled');
    });
}

function goTo(loc) {
    document.getElementById('map-ui').style.display = 'none';
    document.getElementById('dialogue-box').style.display = 'block';
    document.getElementById('scene-bg').style.backgroundImage = `url('${imgs[loc]}')`;
    const msg = document.getElementById('diag-msg'); const ch = document.getElementById('choices'); ch.innerHTML = "";

    if (s.day === 28 && loc === "HOME" && s.i >= 70) {
        msg.innerText = "MOM: 'You've been so dedicated this Ramadan, Sarah. Here's a gift for your Eid outfit!' (+$80)";
        s.m += 80; updateUI(); addChoice("Thank you Mom!", () => next()); return;
    }

    if (loc === "SCHOOL") {
        if (week[s.dIdx] === "FRI" && s.tIdx === 0) {
            msg.innerText = "FRIDAY TEST DAY. Maya is smirking. 'Let's see who's really the top student.'";
            addChoice("Ace the Test (+25 Grades, -40 Energy)", () => { s.g += 25; s.e -= 40; next(); });
            addChoice("Focus Hard (+12 Grades, -20 Energy)", () => { s.g += 12; s.e -= 20; next(); });
        } else {
            msg.innerText = "Academy Classroom. Professor Ali is lecturing about the scholarship.";
            addChoice("Intense Study (+10 Grades, -20 Energy)", () => { s.g += 10; s.e -= 20; next(); });
            addChoice("Network with Friends (+12 Social, -10 Energy)", () => { s.soc += 12; s.e -= 10; next(); });
        }
    } else if (loc === "HOME") {
        msg.innerText = s.day === 29 ? "Eid is tomorrow! Final preparations." : "Home. A place to recharge.";
        addChoice("Sleep (+35 Energy)", () => { s.e += 35; next(); });
        addChoice("Review Notes (+15 Grades, -25 Energy)", () => { s.g += 15; s.e -= 25; next(); });
    } else if (loc === "MARKET") {
        msg.innerText = "The Supermarket Shift. Those dollars add up.";
        addChoice("Double Shift (+$70, -45 Energy)", () => { s.m += 70; s.e -= 45; next(); });
        addChoice("Standard Shift (+$30, -20 Energy)", () => { s.m += 30; s.e -= 20; next(); });
    } else if (loc === "MALL") {
        if (week[s.dIdx] === "SAT" && s.tIdx === 2) {
            document.getElementById('scene-bg').style.backgroundImage = `url('${imgs.FEST}')`;
            msg.innerText = "⭐ SUHOORFEST ⭐ The whole school is here! Maya is showing off her high marks.";
            addChoice("Ignore & Have Fun (+40 Social, -30 Energy, -$30)", () => { if(s.m >= 30){s.m -= 30; s.soc += 40; s.e -= 30; next();} else alert("Not enough cash!"); });
            addChoice("Keep Studying at Cafe (+20 Grades, -30 Energy)", () => { s.g += 20; s.e -= 30; next(); });
        } else {
            msg.innerText = "The Mall. You walk past the designer shop...";
            addChoice("Buy Vitamins (-$30, +40 Energy)", () => { if(s.m >= 30){s.m -= 30; s.e += 40; next();} else alert("Broke!"); });
            addChoice("Window Shop (+15 Social)", () => { s.soc += 15; next(); });
        }
    } else if (loc === "MOSQUE") {
        msg.innerText = "Peaceful prayer hall. Spiritual growth.";
        addChoice("Long Prayer (+30 Iman, -15 Energy)", () => { s.i += 30; s.e -= 15; next(); });
        addChoice("Iftar Volunteer (+15 Iman, +20 Social, -25 Energy)", () => { s.i += 15; s.soc += 20; s.e -= 25; next(); });
    }
}

function addChoice(t, f, fav = false) {
    const b = document.createElement('button');
    b.className = "game-btn full-btn" + (fav ? " fav-btn" : ""); b.innerText = t; b.onclick = f;
    document.getElementById('choices').appendChild(b);
}

function next() {
    updateUI();
    if (s.tIdx === 1) { 
        document.getElementById('map-ui').style.display = 'none'; document.getElementById('dialogue-box').style.display = 'block';
        document.getElementById('diag-msg').innerText = "IFTAR: The sun sets. Time to nourish."; const ch = document.getElementById('choices'); ch.innerHTML = "";
        addChoice("Full Feast (-$25, +60 Energy)", () => { if(s.m >= 25){s.m -= 25; s.e += 60; s.tIdx++; updateUI(); resetMap();} else alert("No money!"); });
        addChoice("Dates & Water (+20 Energy)", () => { s.e += 20; s.tIdx++; updateUI(); resetMap(); });
    } else if (s.tIdx === 2) { 
        document.getElementById('map-ui').style.display = 'none'; document.getElementById('dialogue-box').style.display = 'block';
        document.getElementById('diag-msg').innerText = "MIDNIGHT: Suhoor approaches."; const ch = document.getElementById('choices'); ch.innerHTML = "";
        addChoice("Hearty Suhoor (+45 Energy)", () => { s.e += 45; endDay(); });
        addChoice("Sleep through it (+15 Energy)", () => { s.e += 15; endDay(); });
    } else { s.tIdx++; resetMap(); updateUI(); }
}

function resetMap() { document.getElementById('dialogue-box').style.display = 'none'; document.getElementById('map-ui').style.display = 'grid'; }

function endDay() {
    if (s.day >= 30) { startShopping(); return; }
    s.tIdx = 0; s.day++; s.dIdx = (s.dIdx + 1) % 7; resetMap(); updateUI();
}

function startShopping() {
    document.getElementById('map-ui').style.display = 'none'; document.getElementById('dialogue-box').style.display = 'block';
    document.getElementById('scene-bg').style.backgroundImage = `url('${imgs.MALL}')`;
    const msg = document.getElementById('diag-msg'); const ch = document.getElementById('choices'); ch.innerHTML = "";
    msg.innerText = `EID EVE: You have $${Math.floor(s.m)}. Final choice for the party!`;
    addChoice("Casual Outfit (-$60)", () => { s.m -= 60; finalReveal(); });
    addChoice("Elegant Ensemble (-$160, +40 Social)", () => { if(s.m >= 160){s.m -= 160; s.soc += 40; finalReveal();} else alert("Not enough!"); });
    addChoice("⭐ THE DESIGNER ABAYA ⭐ (-$350, +120 Social)", () => { if(s.m >= 350){s.m -= 350; s.soc += 120; s.designer = true; finalReveal();} else alert("You didn't save enough at the market!"); }, true);
}

function finalReveal() {
    const msg = document.getElementById('diag-msg'); const ch = document.getElementById('choices'); ch.innerHTML = "";
    if (s.g >= 85 && s.i >= 80) {
        document.getElementById('scene-bg').style.backgroundImage = `url('${imgs.EID}')`;
        let txt = "🏆 EID MUBARAK! Professor Ali steps forward: 'The scholarship award for excellence goes to... SARAH!' Maya is speechless. ";
        if (s.designer) txt += "'And Sarah, that Abaya is truly breathtaking!' the Professor adds.";
        msg.innerText = txt + " You celebrate with your family and friends. A perfect end.";
        addChoice("NEW JOURNEY", () => location.reload());
    } else {
        msg.innerText = "EID MUBARAK. The party was fun, but Maya won the scholarship by a few points. Next year, keep those Grades and Iman higher!";
        addChoice("RETRY RAMADAN", () => location.reload());
    }
}

function triggerGameOver(m) { document.getElementById('death-msg').innerText = m; document.getElementById('game-over').style.display = 'flex'; }
updateUI();
</script>
</body>
</html>
